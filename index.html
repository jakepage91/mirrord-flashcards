<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mirrord flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper-50);
    color: var(--ink-800);
    font-family: var(--font-sans);
    font-size: var(--fs-body);
    line-height: var(--lh-base);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out);
  }
  /* Invert the dark mirror logo so it reads on dark surfaces */
  [data-theme="dark"] .brand-mark { filter: invert(1) hue-rotate(180deg); }

  /* Theme toggle button */
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--paper-0); border: 1px solid var(--paper-300);
    cursor: pointer; color: var(--ink-700);
    transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast), transform var(--dur-fast);
  }
  .theme-toggle:hover { border-color: var(--iris-500); color: var(--iris-500); }
  .theme-toggle:active { transform: scale(0.95); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun  { display: none; }
  .theme-toggle .icon-moon { display: block; }
  [data-theme="dark"] .theme-toggle .icon-sun  { display: block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  body {
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, var(--iris-50), transparent 60%),
      var(--paper-50);
  }

  .container { max-width: 880px; margin: 0 auto; padding: var(--s-6) var(--s-5) var(--s-8); }

  /* ========= Header ========= */
  .header {
    display: flex; align-items: center; justify-content: space-between; gap: var(--s-4);
    margin-bottom: var(--s-6); flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 44px; height: auto;
    flex-shrink: 0;
    display: block;
  }
  .brand-name {
    font-family: var(--font-display);
    font-weight: 600; font-size: 1.1rem; color: var(--ink-900); letter-spacing: -0.01em;
  }
  .brand-name em { font-style: normal; color: var(--iris-600); font-weight: 600; }
  .brand-sub {
    font-family: var(--font-mono); font-size: 10px; color: var(--ink-500);
    letter-spacing: var(--tr-wide); text-transform: uppercase;
  }

  .header-actions { display: flex; gap: var(--s-2); flex-wrap: wrap; }

  /* ========= Buttons ========= */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: var(--font-sans); font-weight: 500; font-size: var(--fs-sm);
    padding: 9px 16px; border-radius: var(--r-pill);
    border: 1px solid transparent; cursor: pointer; text-decoration: none;
    transition: transform var(--dur-fast) var(--ease-out),
                background var(--dur-base), box-shadow var(--dur-base), border-color var(--dur-base);
    white-space: nowrap; color: var(--ink-800);
    background: transparent;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--iris-500); color: #fff; border-color: var(--iris-500);
    box-shadow: var(--shadow-glow-iris);
  }
  .btn-primary:hover { background: var(--iris-600); border-color: var(--iris-600); }
  .btn-secondary {
    background: var(--paper-0); color: var(--ink-900); border-color: var(--paper-300);
  }
  .btn-secondary:hover { border-color: var(--iris-500); color: var(--iris-600); }
  .btn-ghost { color: var(--ink-700); }
  .btn-ghost:hover { background: var(--paper-100); }
  .btn-good {
    background: #E7F5EC; color: #1E6B43; border-color: #B7DFC4;
  }
  .btn-good:hover { background: #D4EEDC; border-color: var(--success); }
  .btn-hard {
    background: var(--amber-100); color: var(--amber-600); border-color: #F1D59A;
  }
  .btn-hard:hover { background: #FFE4B3; border-color: var(--amber-500); }
  .btn-again {
    background: #FBE3E6; color: var(--danger); border-color: #EFC3C9;
  }
  .btn-again:hover { background: #F8CED4; border-color: var(--danger); }
  .btn-sm { padding: 6px 12px; font-size: var(--fs-xs); }
  .btn-lg { padding: 12px 22px; font-size: var(--fs-body); }
  .btn svg { width: 14px; height: 14px; }

  .hidden { display: none !important; }

  /* ========= Card (main flashcard) ========= */
  .flashcard {
    background: var(--paper-0);
    border: var(--border-soft);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    position: relative;
  }
  .flashcard-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s-4) var(--s-5);
    border-bottom: var(--border-soft);
    background: var(--paper-50);
  }
  .meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-500);
    letter-spacing: 0.02em; display: flex; gap: var(--s-3); flex-wrap: wrap;
  }
  .meta strong { color: var(--ink-900); font-weight: 600; }
  .progress-track {
    width: 120px; height: 4px; background: var(--paper-200); border-radius: var(--r-pill);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--iris-500), var(--iris-300));
    border-radius: var(--r-pill);
    transition: width var(--dur-slow) var(--ease-out);
  }

  .flashcard-body { padding: var(--s-6) var(--s-6) var(--s-5); }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: var(--fs-eyebrow);
    text-transform: uppercase; letter-spacing: var(--tr-wide);
    color: var(--ink-500); margin-bottom: var(--s-3);
  }
  .eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 2px;
    background: var(--amber-500);
  }

  .prompt {
    font-family: var(--font-display);
    font-size: 1.4rem; line-height: 1.35; letter-spacing: -0.015em;
    font-weight: 500; color: var(--ink-900); margin-bottom: var(--s-4);
    text-wrap: pretty;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 1.0625rem; font-weight: 600; color: var(--ink-900); letter-spacing: -0.01em;
  }
  .answer {
    background: var(--paper-50);
    border: 1px dashed var(--paper-300);
    border-radius: var(--r-md);
    padding: var(--s-5);
    line-height: 1.6; color: var(--ink-700);
    white-space: pre-wrap;
    font-size: 0.98rem;
    display: none;
    animation: fadein var(--dur-base) var(--ease-out);
  }
  .answer.visible { display: block; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: var(--s-4); }
  .chip {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: var(--r-pill);
    background: var(--paper-100); color: var(--ink-700);
    border: var(--border-soft);
    letter-spacing: 0.02em;
  }
  .chip-source-core   { background: var(--iris-100); color: var(--iris-700); border-color: transparent; }
  .chip-source-custom { background: var(--amber-100); color: var(--amber-600); border-color: transparent; }

  .flashcard-actions {
    padding: var(--s-5) var(--s-6) var(--s-6);
    display: flex; gap: var(--s-2); flex-wrap: wrap;
    border-top: var(--border-soft);
    background: var(--paper-50);
  }
  .flashcard-actions .btn { flex: 1 1 auto; min-width: 0; }
  .grade-row { display: flex; gap: var(--s-2); width: 100%; }
  .grade-row .btn { flex: 1 1 0; }

  /* ========= Filters row ========= */
  .filters {
    display: flex; gap: var(--s-3); flex-wrap: wrap; align-items: center;
    margin-top: var(--s-4);
    padding: var(--s-3) var(--s-4);
    background: var(--paper-0);
    border: var(--border-soft);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-xs);
  }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-group label {
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: var(--tr-wide); color: var(--ink-500);
  }
  select, input[type="text"], input[type="file"] {
    font-family: var(--font-sans); font-size: var(--fs-sm); color: var(--ink-800);
    padding: 7px 12px; border-radius: var(--r-md);
    border: 1px solid var(--paper-300); background: var(--paper-0);
    min-width: 0;
  }
  select:focus, input:focus, textarea:focus {
    outline: none; border-color: var(--iris-500); box-shadow: 0 0 0 3px var(--iris-100);
  }
  .status-pill {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-700);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .status-pill b { color: var(--ink-900); font-weight: 600; }

  /* ========= Author panel ========= */
  .panel {
    margin-top: var(--s-6);
    background: var(--paper-0);
    border: var(--border-soft);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .panel-head {
    padding: var(--s-5) var(--s-5) 0;
    display: flex; justify-content: space-between; align-items: flex-start; gap: var(--s-3);
    flex-wrap: wrap;
  }

  .panel-sub   { font-size: var(--fs-sm); color: var(--ink-500); margin-top: 4px; max-width: 48ch; }
  .panel-toggle {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tr-wide);
    text-transform: uppercase; color: var(--ink-500); background: none; border: 0; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .panel-toggle:hover { color: var(--ink-900); }
  .panel-body { padding: var(--s-5); border-top: var(--border-soft); margin-top: var(--s-4); }
  .panel-body.collapsed { display: none; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
  .field-label {
    display: block;
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: var(--tr-wide); color: var(--ink-500); margin-bottom: 6px;
  }
  textarea {
    width: 100%; min-height: 96px; resize: vertical;
    font-family: var(--font-sans); font-size: var(--fs-sm); line-height: 1.5;
    padding: 12px 14px; border-radius: var(--r-md);
    border: 1px solid var(--paper-300); background: var(--paper-0); color: var(--ink-800);
  }
  .author-row {
    display: flex; gap: var(--s-3); margin-top: var(--s-4); flex-wrap: wrap; align-items: center;
  }
  .author-row input { flex: 1 1 220px; }
  .author-row select { flex: 0 1 140px; }
  .add-status {
    font-family: var(--font-mono); font-size: 11px; color: var(--danger);
    margin-top: var(--s-3); min-height: 14px;
  }
  .add-status.ok { color: var(--success); }

  .io-row {
    display: flex; gap: var(--s-3); flex-wrap: wrap; align-items: center;
    margin-top: var(--s-5); padding-top: var(--s-4); border-top: 1px dashed var(--paper-200);
  }
  .io-row label {
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: var(--tr-wide); color: var(--ink-500);
  }

  /* ========= Empty / complete state ========= */
  .empty {
    text-align: center; padding: var(--s-7) var(--s-5);
  }
  .empty-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--iris-300), var(--iris-500));
    margin: 0 auto var(--s-4);
    box-shadow: var(--shadow-glow-iris);
  }
  .empty h3 { font-family: var(--font-display); letter-spacing: -0.01em; }
  .empty h3 {
    font-size: 1.25rem; font-weight: 600; color: var(--ink-900);
    letter-spacing: var(--tr-snug); margin-bottom: 8px;
  }
  .empty p { color: var(--ink-500); font-size: var(--fs-sm); max-width: 40ch; margin: 0 auto; }

  /* ========= Footer ========= */
  .footer {
    margin-top: var(--s-7); padding-top: var(--s-4);
    border-top: var(--border-soft);
    text-align: center;
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-500);
    letter-spacing: 0.02em;
  }
  .footer em { font-style: italic; color: var(--ink-700); }

  @media (max-width: 680px) {
    .container { padding: var(--s-4); }
    .prompt { font-size: 1.2rem; }
    .grid { grid-template-columns: 1fr; }
    .grade-row { flex-wrap: wrap; }
    .grade-row .btn { flex: 1 1 calc(50% - 4px); }
    .status-pill { margin-left: 0; }
    .flashcard-body, .flashcard-actions, .flashcard-head { padding-left: var(--s-4); padding-right: var(--s-4); }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="brand">
      <img class="brand-mark" src="logo.png" alt="mirrord mirror mascot" />
      <div>
        <div class="brand-name"><em>mirrord</em> flashcards</div>
        <div class="brand-sub">deep-dive · spaced repetition</div>
      </div>
    </div>
    <div class="header-actions">
      <button id="newModeBtn" class="btn btn-secondary btn-sm">Include new</button>
      <button id="shuffleBtn" class="btn btn-ghost btn-sm">Shuffle</button>
      <button id="exportBtn" class="btn btn-ghost btn-sm">Export progress</button>
      <button id="exportDeckBtn" class="btn btn-ghost btn-sm">Export custom</button>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Flashcard ===== -->
  <section class="flashcard" id="cardWrap">
    <div class="flashcard-head">
      <div class="meta" id="meta">loading…</div>
      <div class="progress-track" title="queue progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="flashcard-body">
      <div class="eyebrow" id="eyebrow">Question</div>
      <div class="prompt" id="front">—</div>
      <div class="answer" id="back"></div>
      <div class="chips" id="tags"></div>
    </div>
    <div class="flashcard-actions" id="actions">
      <button id="showBtn" class="btn btn-primary btn-lg" style="flex: 1 1 100%;">Show answer</button>
      <div class="grade-row hidden" id="gradeRow">
        <button id="againBtn" class="btn btn-again">Again</button>
        <button id="hardBtn"  class="btn btn-hard">Hard</button>
        <button id="goodBtn"  class="btn btn-good">Good</button>
        <button id="easyBtn"  class="btn btn-good" style="background:#D4EEDC; border-color: var(--success); color: #145635;">Easy</button>
      </div>
    </div>
  </section>

  <!-- ===== Filters ===== -->
  <div class="filters">
    <div class="filter-group">
      <label for="tagFilter">Tag</label>
      <select id="tagFilter"></select>
    </div>
    <div class="filter-group">
      <label for="sourceFilter">Source</label>
      <select id="sourceFilter">
        <option value="all">all</option>
        <option value="core">core deck</option>
        <option value="custom">custom</option>
      </select>
    </div>
    <div class="status-pill" id="status">—</div>
  </div>

  <!-- ===== Author panel ===== -->
  <section class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">Add a flashcard</div>
        <div class="panel-sub">For upcoming features, customer objections, demo notes. Saved locally in your browser.</div>
      </div>
      <button class="panel-toggle" id="panelToggle" aria-expanded="true">
        <span id="panelToggleLabel">Collapse</span>
        <span id="panelToggleIcon">−</span>
      </button>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="grid">
        <div>
          <label for="newFront" class="field-label">Question · front</label>
          <textarea id="newFront" placeholder="Example: Why use filtered steal instead of full steal in shared staging?"></textarea>
        </div>
        <div>
          <label for="newBack" class="field-label">Answer · back</label>
          <textarea id="newBack" placeholder="Explain what + why + step-by-step behavior + safety tradeoff."></textarea>
        </div>
      </div>
      <div class="author-row">
        <input id="newTags" type="text" placeholder="tags, comma separated (policy, staging, devrel)" />
        <select id="newDifficulty">
          <option value="1">difficulty 1</option>
          <option value="2" selected>difficulty 2</option>
          <option value="3">difficulty 3</option>
          <option value="4">difficulty 4</option>
          <option value="5">difficulty 5</option>
        </select>
        <button id="addCardBtn" class="btn btn-primary">Add card</button>
      </div>
      <div class="add-status" id="addCardStatus"></div>

      <div class="io-row">
        <label for="importProgressInput">Import progress</label>
        <input id="importProgressInput" type="file" accept="application/json" />
        <label for="importDeckInput">Import custom</label>
        <input id="importDeckInput" type="file" accept="application/json" />
        <button id="resetBtn" class="btn btn-again btn-sm">Reset progress</button>
        <button id="clearCustomBtn" class="btn btn-again btn-sm">Delete custom</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    Built with <em>cloudforge</em> design system · answer in the order: what → why → step-by-step → safety.
  </footer>
</div>

<script>
  // ================================================================
  // Logic preserved from original — only rendering shell is new.
  // Same storage keys so progress carries over from the old UI.
  // ================================================================
  const STORAGE_KEY = 'mirrord_flashcards_progress_v2';
  const PREFS_KEY = 'mirrord_flashcards_prefs_v2';
  const CUSTOM_DECK_KEY = 'mirrord_flashcards_custom_cards_v1';

  const state = {
    baseCards: [],
    customCards: [],
    cards: [],
    progress: {},
    queue: [],
    idx: 0,
    initialQueueLen: 0,
    includeNew: true,
    tag: 'all',
    source: 'all'
  };

  const el = {
    meta: document.getElementById('meta'),
    front: document.getElementById('front'),
    back: document.getElementById('back'),
    tags: document.getElementById('tags'),
    eyebrow: document.getElementById('eyebrow'),
    progressFill: document.getElementById('progressFill'),
    showBtn: document.getElementById('showBtn'),
    gradeRow: document.getElementById('gradeRow'),
    againBtn: document.getElementById('againBtn'),
    hardBtn: document.getElementById('hardBtn'),
    goodBtn: document.getElementById('goodBtn'),
    easyBtn: document.getElementById('easyBtn'),
    status: document.getElementById('status'),
    exportBtn: document.getElementById('exportBtn'),
    resetBtn: document.getElementById('resetBtn'),
    newModeBtn: document.getElementById('newModeBtn'),
    shuffleBtn: document.getElementById('shuffleBtn'),
    tagFilter: document.getElementById('tagFilter'),
    sourceFilter: document.getElementById('sourceFilter'),
    importProgressInput: document.getElementById('importProgressInput'),
    importDeckInput: document.getElementById('importDeckInput'),
    exportDeckBtn: document.getElementById('exportDeckBtn'),
    newFront: document.getElementById('newFront'),
    newBack: document.getElementById('newBack'),
    newTags: document.getElementById('newTags'),
    newDifficulty: document.getElementById('newDifficulty'),
    addCardBtn: document.getElementById('addCardBtn'),
    addCardStatus: document.getElementById('addCardStatus'),
    clearCustomBtn: document.getElementById('clearCustomBtn'),
    cardWrap: document.getElementById('cardWrap'),
    actions: document.getElementById('actions'),
    panelToggle: document.getElementById('panelToggle'),
    panelBody: document.getElementById('panelBody'),
    panelToggleLabel: document.getElementById('panelToggleLabel'),
    panelToggleIcon: document.getElementById('panelToggleIcon')
  };

  const todayStr = () => new Date().toISOString().slice(0, 10);
  const plusDays = (d) => {
    const x = new Date();
    x.setDate(x.getDate() + d);
    return x.toISOString().slice(0, 10);
  };

  function parseTags(raw) {
    return (raw || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
  }

  function defaultProgress(card) {
    return { id: card.id, reps: 0, interval: 0, ease: 2.5, due: todayStr(), last: null };
  }

  function loadProgress() {
    const raw = localStorage.getItem(STORAGE_KEY);
    state.progress = raw ? JSON.parse(raw) : {};
    for (const card of state.cards) {
      if (!state.progress[card.id]) state.progress[card.id] = defaultProgress(card);
    }
    saveProgress();
  }
  function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); }

  function loadPrefs() {
    const raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    state.includeNew = p.includeNew ?? true;
    state.tag = p.tag ?? 'all';
    state.source = p.source ?? 'all';
  }
  function savePrefs() {
    localStorage.setItem(PREFS_KEY, JSON.stringify({
      includeNew: state.includeNew, tag: state.tag, source: state.source
    }));
  }

  function loadCustomCards() {
    const raw = localStorage.getItem(CUSTOM_DECK_KEY);
    state.customCards = raw ? JSON.parse(raw) : [];
  }
  function saveCustomCards() { localStorage.setItem(CUSTOM_DECK_KEY, JSON.stringify(state.customCards)); }

  function rebuildCards() {
    state.cards = [
      ...state.baseCards.map(c => ({ ...c, source: 'core' })),
      ...state.customCards.map(c => ({ ...c, source: 'custom' }))
    ];
  }

  function isDue(p) { return p.due <= todayStr(); }

  function cardMatchesFilters(card) {
    const tagOk = state.tag === 'all' || card.tags.includes(state.tag);
    const sourceOk = state.source === 'all' || card.source === state.source;
    return tagOk && sourceOk;
  }

  function buildQueue() {
    const cards = state.cards.filter(cardMatchesFilters);
    const due = cards.filter(c => isDue(state.progress[c.id]));
    const unseen = cards.filter(c => state.progress[c.id].reps === 0);
    state.queue = [...due];
    if (state.includeNew) {
      const unseenNotQueued = unseen.filter(c => !state.queue.some(q => q.id === c.id));
      state.queue.push(...unseenNotQueued.slice(0, 16));
    }
    state.queue.sort((a, b) => state.progress[a.id].due.localeCompare(state.progress[b.id].due));
    state.idx = 0;
    state.initialQueueLen = state.queue.length;
  }

  function shuffleQueue() {
    for (let i = state.queue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [state.queue[i], state.queue[j]] = [state.queue[j], state.queue[i]];
    }
    state.idx = 0;
  }

  function renderTagFilter() {
    const set = new Set(['all']);
    state.cards.forEach(c => c.tags.forEach(t => set.add(t)));
    el.tagFilter.innerHTML = '';
    [...set].sort().forEach(tag => {
      const opt = document.createElement('option');
      opt.value = tag; opt.textContent = tag;
      opt.selected = tag === state.tag;
      el.tagFilter.appendChild(opt);
    });
  }

  function renderEmpty() {
    el.cardWrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon" aria-hidden="true"></div>
        <h3>Queue complete.</h3>
        <p>No cards due with the current filter. Toggle <em>Include new</em> or adjust tag / source to keep studying.</p>
      </div>`;
  }

  function showCard() {
    if (!state.queue.length) {
      renderEmpty();
      el.status.innerHTML = summaryText();
      return;
    }
    // Ensure card chrome exists (re-mount if previously emptied)
    if (!document.getElementById('front')) mountCardChrome();

    const card = state.queue[state.idx];
    const p = state.progress[card.id];
    const srcClass = card.source === 'core' ? 'chip-source-core' : 'chip-source-custom';

    document.getElementById('meta').innerHTML =
      `<span><strong>${state.idx + 1}</strong> / ${state.queue.length}</span>
       <span>due <strong>${p.due}</strong></span>
       <span>reps <strong>${p.reps}</strong></span>
       <span>ease <strong>${p.ease.toFixed(2)}</strong></span>`;

    document.getElementById('eyebrow').textContent = 'Question';
    document.getElementById('front').textContent = card.front;
    const backEl = document.getElementById('back');
    backEl.textContent = card.back;
    backEl.classList.remove('visible');

    document.getElementById('tags').innerHTML =
      `<span class="chip ${srcClass}">${card.source}</span>` +
      card.tags.map(t => `<span class="chip">${t}</span>`).join('');

    const pct = state.initialQueueLen ? Math.round(((state.initialQueueLen - state.queue.length + 1) / state.initialQueueLen) * 100) : 0;
    document.getElementById('progressFill').style.width = Math.min(100, Math.max(0, pct)) + '%';

    document.getElementById('showBtn').classList.remove('hidden');
    document.getElementById('gradeRow').classList.add('hidden');

    el.status.innerHTML = summaryText();
  }

  function mountCardChrome() {
    el.cardWrap.innerHTML = `
      <div class="flashcard-head">
        <div class="meta" id="meta"></div>
        <div class="progress-track" title="queue progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="flashcard-body">
        <div class="eyebrow" id="eyebrow">Question</div>
        <div class="prompt" id="front">—</div>
        <div class="answer" id="back"></div>
        <div class="chips" id="tags"></div>
      </div>
      <div class="flashcard-actions" id="actions">
        <button id="showBtn" class="btn btn-primary btn-lg" style="flex: 1 1 100%;">Show answer</button>
        <div class="grade-row hidden" id="gradeRow">
          <button id="againBtn" class="btn btn-again">Again</button>
          <button id="hardBtn"  class="btn btn-hard">Hard</button>
          <button id="goodBtn"  class="btn btn-good">Good</button>
          <button id="easyBtn"  class="btn btn-good" style="background:#D4EEDC; border-color: var(--success); color: #145635;">Easy</button>
        </div>
      </div>`;
    wireCardButtons();
  }

  function summaryText() {
    const entries = Object.values(state.progress);
    const due = entries.filter(isDue).length;
    const learned = entries.filter(x => x.reps > 0).length;
    return `<span>total <b>${entries.length}</b></span><span>due <b>${due}</b></span><span>learned <b>${learned}</b></span><span>custom <b>${state.customCards.length}</b></span>`;
  }

  function wireCardButtons() {
    const showBtn = document.getElementById('showBtn');
    const gradeRow = document.getElementById('gradeRow');
    const backEl   = document.getElementById('back');
    showBtn?.addEventListener('click', () => {
      backEl.classList.add('visible');
      showBtn.classList.add('hidden');
      gradeRow.classList.remove('hidden');
      document.getElementById('eyebrow').textContent = 'Answer';
    });
    document.getElementById('againBtn')?.addEventListener('click', () => gradeCard('again'));
    document.getElementById('hardBtn') ?.addEventListener('click', () => gradeCard('hard'));
    document.getElementById('goodBtn') ?.addEventListener('click', () => gradeCard('good'));
    document.getElementById('easyBtn') ?.addEventListener('click', () => gradeCard('easy'));
  }

  function gradeCard(grade) {
    const card = state.queue[state.idx];
    if (!card) return;
    const p = state.progress[card.id];
    if (grade === 'again') {
      p.reps = 0; p.interval = 0;
      p.ease = Math.max(1.3, p.ease - 0.2);
      p.due = plusDays(0);
    } else {
      p.reps += 1;
      const q = grade === 'hard' ? 3 : grade === 'good' ? 4 : 5;
      p.ease = Math.max(1.3, p.ease + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
      if (p.reps === 1) p.interval = grade === 'easy' ? 3 : 1;
      else if (p.reps === 2) p.interval = grade === 'easy' ? 7 : 3;
      else {
        const mult = grade === 'hard' ? 1.2 : grade === 'easy' ? 1.6 : 1.4;
        p.interval = Math.max(1, Math.round(p.interval * p.ease * mult));
      }
      p.due = plusDays(p.interval);
    }
    p.last = todayStr();
    saveProgress();
    state.queue.splice(state.idx, 1);
    if (state.idx >= state.queue.length) state.idx = Math.max(0, state.queue.length - 1);
    showCard();
  }

  function refreshAll() {
    rebuildCards();
    loadProgress();
    renderTagFilter();
    buildQueue();
    updateButtons();
    mountCardChrome();
    showCard();
  }

  function updateButtons() {
    el.newModeBtn.textContent = state.includeNew ? 'Including new' : 'Review due only';
    el.newModeBtn.classList.toggle('btn-primary', state.includeNew);
    el.newModeBtn.classList.toggle('btn-secondary', !state.includeNew);
    el.sourceFilter.value = state.source;
  }

  function addCustomCard() {
    const front = el.newFront.value.trim();
    const back = el.newBack.value.trim();
    const tags = parseTags(el.newTags.value);
    const difficulty = Number(el.newDifficulty.value || 2);
    if (!front || !back) {
      el.addCardStatus.textContent = 'Question and answer are both required.';
      el.addCardStatus.classList.remove('ok');
      return;
    }
    const newCard = {
      id: `custom-${Date.now()}`,
      front, back,
      tags: tags.length ? tags : ['custom'],
      difficulty
    };
    state.customCards.unshift(newCard);
    saveCustomCards();
    el.newFront.value = ''; el.newBack.value = ''; el.newTags.value = '';
    el.newDifficulty.value = '2';
    el.addCardStatus.textContent = '✓ Card added.';
    el.addCardStatus.classList.add('ok');
    refreshAll();
  }

  async function loadBaseCards() {
    const res = await fetch('./cards.json');
    state.baseCards = await res.json();
  }

  // ===== Event wiring =====
  el.newModeBtn.addEventListener('click', () => {
    state.includeNew = !state.includeNew;
    savePrefs(); buildQueue(); updateButtons(); showCard();
  });
  el.shuffleBtn.addEventListener('click', () => { shuffleQueue(); showCard(); });
  el.tagFilter.addEventListener('change', (e) => { state.tag = e.target.value; savePrefs(); buildQueue(); showCard(); });
  el.sourceFilter.addEventListener('change', (e) => { state.source = e.target.value; savePrefs(); buildQueue(); showCard(); });

  el.exportBtn.addEventListener('click', () => {
    const payload = { progress: state.progress, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mirrord-flashcards-progress-${todayStr()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  });
  el.exportDeckBtn.addEventListener('click', () => {
    const payload = { customCards: state.customCards, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mirrord-flashcards-custom-cards-${todayStr()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  });
  el.importProgressInput.addEventListener('change', async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      if (!parsed.progress || typeof parsed.progress !== 'object') throw new Error('invalid');
      state.progress = { ...state.progress, ...parsed.progress };
      saveProgress(); buildQueue(); showCard();
    } catch { alert('Invalid progress file.'); }
    e.target.value = '';
  });
  el.importDeckInput.addEventListener('change', async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      const cards = parsed.customCards || parsed.cards || [];
      if (!Array.isArray(cards)) throw new Error('invalid');
      const normalized = cards.filter(c => c && c.front && c.back).map(c => ({
        id: c.id || `custom-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        front: String(c.front).trim(),
        back: String(c.back).trim(),
        tags: Array.isArray(c.tags) && c.tags.length ? c.tags.map(t => String(t).toLowerCase()) : ['custom'],
        difficulty: Number(c.difficulty || 2)
      }));
      state.customCards = [...normalized, ...state.customCards];
      saveCustomCards(); refreshAll();
    } catch { alert('Invalid custom cards file.'); }
    e.target.value = '';
  });
  el.addCardBtn.addEventListener('click', addCustomCard);
  el.resetBtn.addEventListener('click', () => {
    if (!confirm('Reset all progress?')) return;
    state.progress = {}; loadProgress(); buildQueue(); showCard();
  });
  el.clearCustomBtn.addEventListener('click', () => {
    if (!confirm('Delete all custom cards?')) return;
    state.customCards = []; saveCustomCards(); refreshAll();
  });

  el.panelToggle.addEventListener('click', () => {
    const collapsed = el.panelBody.classList.toggle('collapsed');
    el.panelToggleLabel.textContent = collapsed ? 'Expand' : 'Collapse';
    el.panelToggleIcon.textContent  = collapsed ? '+' : '−';
    el.panelToggle.setAttribute('aria-expanded', String(!collapsed));
  });

  // ===== Theme toggle =====
  const THEME_KEY = 'mirrord_flashcards_theme';
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(THEME_KEY, t); } catch {}
  }
  (function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch {}
    if (saved === 'dark' || saved === 'light') {
      applyTheme(saved);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      applyTheme('dark');
    } else {
      applyTheme('light');
    }
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(cur);
  });

  (async function init() {
    try {
      await loadBaseCards();
    } catch (e) {
      console.warn('cards.json not loaded — empty deck', e);
    }
    loadPrefs();
    loadCustomCards();
    refreshAll();
    wireCardButtons();
  })();
</script>
</body>
</html>
