name: Weekly flashcard discussion digest

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  discussions: read

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate digest
        run: ./scripts/weekly_discussion_digest.sh

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-discussion-digest
          path: discussion-digest/weekly-discussion-digest.md
